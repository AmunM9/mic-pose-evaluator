services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: micpose
      POSTGRES_USER: micpose
      POSTGRES_PASSWORD: micpose_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U micpose"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://micpose:micpose_dev@db:5432/micpose
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: development
      MAX_AUDIO_SIZE_MB: 25
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
